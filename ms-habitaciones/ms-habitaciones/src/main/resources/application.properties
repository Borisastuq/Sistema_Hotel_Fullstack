server.port=8082
spring.application.name=ms-habitaciones

# --- CONEXION A BASE DE DATOS INDEPENDIENTE ---
spring.datasource.url=jdbc:mysql://localhost:3306/db_habitaciones?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

# --- CONFIGURACION JPA / HIBERNATE ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# --- REGISTRO EN EUREKA SERVER ---
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# --- CONFIGURACION DE LOGS (REQUISITO RUBRICA) ---
logging.level.org.springframework.web=DEBUG
logging.level.com.hotel.reserva=DEBUG

# --- CONFIGURACION DE SWAGGER ---
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html