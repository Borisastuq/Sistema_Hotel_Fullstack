# --- BASE DE DATOS SEPARADA PARA PRUEBAS ---
spring.datasource.url=jdbc:mysql://localhost:3306/db_reservas_test?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

# --- HIBERNATE: crea las tablas y las borra al terminar ---
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# --- EVITA QUE LOS TESTS SE REGISTREN EN EUREKA ---
eureka.client.enabled=false