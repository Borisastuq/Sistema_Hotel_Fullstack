server.port=8081
spring.application.name=ms-huespedes

# --- CONEXION A BASE DE DATOS INDEPENDIENTE ---
spring.datasource.url=jdbc:mysql://localhost:3306/db_huespedes?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

# --- CONFIGURACION JPA / HIBERNATE ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- REGISTRO EN EUREKA SERVER ---
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# --- CONFIGURACION DE LOGS (REQUISITO RUBRICA) ---
logging.level.org.springframework.web=DEBUG
logging.level.com.hotel.reserva=DEBUG