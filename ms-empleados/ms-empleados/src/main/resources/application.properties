server.port=8085
spring.application.name=ms-empleados

# Conexion a XAMPP - BD Independiente
spring.datasource.url=jdbc:mysql://localhost:3306/db_empleados?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

# Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Registro en Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Configuracion de Logs (Rubrica)
logging.level.org.springframework.web=DEBUG
logging.level.com.hotel.reserva=DEBUG